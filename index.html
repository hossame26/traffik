    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Quels types de sites web proposez-vous ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous créons trois types de sites : des boutiques Shopify pour le e-commerce, des sites WordPress pour la flexibilité éditoriale, et des sites sur mesure en React/Next.js pour une performance maximale."
          }
        },
        {
          "@type": "Question",
          "name": "Combien coûte la création d'un site web ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un site Shopify démarre à partir de 1500€, un site WordPress à partir de 1200€, et un site sur mesure à partir de 3000€. Contactez-nous pour un devis personnalisé gratuit."
          }
        },
        {
          "@type": "Question",
          "name": "Quel est le délai de livraison ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un site Shopify ou WordPress est livré en 2 à 3 semaines. Un site sur mesure nécessite 4 à 6 semaines selon sa complexité."
          }
        },
        {
          "@type": "Question",
          "name": "Proposez-vous un accompagnement après la mise en ligne ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, nous offrons une formation de prise en main incluse et des forfaits de maintenance mensuelle pour les mises à jour et le support technique."
          }
        }
      ]
    }
